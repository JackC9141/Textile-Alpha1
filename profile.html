<!-- ══════════════════════════
     PAGE: PROFILE
══════════════════════════ -->
<div class="page" id="page-profile">
  <!-- Sidebar -->
  <div class="profile-sidebar">
    <div class="profile-sidebar-item">Followers</div>
    <div class="profile-sidebar-item">Engines</div>
    <div class="profile-sidebar-item">Create</div>
  </div>

  <!-- Main content -->
  <div class="profile-main">
    <div class="profile-avatar-wrap">
      <div class="profile-avatar">👤</div>
    </div>
    <div class="profile-name">Jeremiah Mullen</div>
    <div class="profile-handle">@username</div>
    <div class="profile-stats">
      <span>Posts #</span>
      <span>Threads #</span>
      <span>Servers #</span>
    </div>
    <div class="profile-actions">
      <button class="btn-follow">Follow</button>
      <button class="btn-message">Message</button>
    </div>

    <div class="profile-tabs">
      <div class="profile-tab active" onclick="switchProfileTab(this, 'posts-grid-section')">Posts</div>
      <div class="profile-tab" onclick="switchProfileTab(this, 'forums-tab-section')">Forums</div>
      <div class="profile-tab" onclick="switchProfileTab(this, 'servers-tab-section')">Servers</div>
    </div>

    <div id="posts-grid-section">
      <div class="posts-grid">
        <div class="post-thumb">Post</div>
        <div class="post-thumb">Post</div>
        <div class="post-thumb">Post</div>
        <div class="post-thumb">Post</div>
        <div class="post-thumb">Post</div>
        <div class="post-thumb">Post</div>
        <div class="post-thumb">Post</div>
        <div class="post-thumb">Post</div>
      </div>
    </div>
    <div id="forums-tab-section" style="display:none">
      <p style="color:#999;font-size:14px;text-align:center;padding:40px 0;">No forums yet.</p>
    </div>
    <div id="servers-tab-section" style="display:none">
      <p style="color:#999;font-size:14px;text-align:center;padding:40px 0;">No servers yet.</p>
    </div>
  </div>
</div>
